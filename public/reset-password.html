<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Syruvia – Reset Password</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#4f46e5;--accent2:#7c3aed;
  --bg:#f5f3ff;--card:#fff;--border:#e0e7ff;
  --text:#1e1b4b;--text2:#4c4a7a;--text3:#9b99c5;
  --red:#dc2626;--green:#16a34a;
}
body{
  font-family:Inter,ui-sans-serif,system-ui,-apple-system,sans-serif;
  background:
    radial-gradient(ellipse at 20% 0%,rgba(79,70,229,.18) 0%,transparent 50%),
    radial-gradient(ellipse at 80% 100%,rgba(124,58,237,.14) 0%,transparent 50%),
    linear-gradient(160deg,#f0eeff 0%,#fafafe 60%,#f0f4ff 100%);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  font-size:13px;color:var(--text);
}
.card{
  background:rgba(255,255,255,.96);
  border:1px solid rgba(224,231,255,.8);
  border-radius:24px;
  box-shadow:0 8px 40px rgba(79,70,229,.12),0 1px 0 rgba(255,255,255,.8) inset;
  padding:44px 40px 40px;
  width:420px;max-width:95vw;
}
.logo-wrap{text-align:center;margin-bottom:32px}
.logo-wrap img{height:44px;width:auto;margin-bottom:10px}
.logo-tagline{font-size:12px;color:var(--text3);letter-spacing:.02em}
h2{font-size:20px;font-weight:800;color:var(--text);letter-spacing:-.03em;margin-bottom:4px;text-align:center}
.subtitle{font-size:12.5px;color:var(--text2);text-align:center;margin-bottom:28px}
.form-row{margin-bottom:16px}
label{display:block;font-size:11.5px;font-weight:700;color:var(--text2);margin-bottom:6px;letter-spacing:.01em}
input{
  width:100%;padding:11px 14px;
  border:1.5px solid var(--border);border-radius:12px;
  font-size:13px;color:var(--text);background:#fff;outline:none;font-family:inherit;
  transition:.18s ease;
}
input:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(79,70,229,.1)}
.btn{
  width:100%;padding:13px;border:none;border-radius:13px;font-size:14px;font-weight:700;
  cursor:pointer;font-family:inherit;letter-spacing:-.01em;
  background:linear-gradient(135deg,#4f46e5 0%,#7c3aed 100%);
  color:#fff;box-shadow:0 4px 20px rgba(79,70,229,.35);
  transition:all .18s ease;margin-top:6px;
}
.btn:hover{transform:translateY(-1px);box-shadow:0 8px 28px rgba(79,70,229,.42)}
.btn:disabled{opacity:.7;cursor:wait}
.msg{display:none;margin-top:18px;padding:12px 14px;border-radius:10px;font-size:12.5px;line-height:1.55}
.msg.ok{display:block;background:#dcfce7;color:#166534;border:1px solid #bbf7d0}
.msg.err{display:block;background:#fee2e2;color:#991b1b;border:1px solid #fecaca}
.back-link{display:block;text-align:center;margin-top:20px;font-size:12px;color:var(--accent);text-decoration:none;font-weight:600}
.back-link:hover{text-decoration:underline}
.hint{font-size:11.5px;color:var(--text3);margin-top:4px}
</style>
</head>
<body>
<div class="card">
  <div class="logo-wrap">
    <img src="/syruvia-logo.svg" alt="Syruvia"/>
    <div class="logo-tagline">Work Management Platform</div>
  </div>

  <h2>Choose a new password</h2>
  <p class="subtitle">Enter a new password for your account.</p>

  <div id="form-block">
    <div class="form-row">
      <label>New password</label>
      <input type="password" id="pw1" placeholder="At least 6 characters" autocomplete="new-password"/>
    </div>
    <div class="form-row">
      <label>Confirm new password</label>
      <input type="password" id="pw2" placeholder="Re-enter password" autocomplete="new-password"/>
    </div>
    <button class="btn" id="submit-btn" onclick="submitForm()">Set new password →</button>
  </div>

  <div class="msg" id="msg"></div>

  <a href="/login.html" class="back-link">← Back to sign in</a>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const token  = params.get('token') || '';

if (!token) {
  document.getElementById('form-block').style.display = 'none';
  const msg = document.getElementById('msg');
  msg.textContent = 'No reset token found. Please request a new password reset link.';
  msg.className = 'msg err';
}

async function submitForm() {
  const pw1 = document.getElementById('pw1').value;
  const pw2 = document.getElementById('pw2').value;
  const msg = document.getElementById('msg');
  msg.className = 'msg';
  if (!pw1 || pw1.length < 6) { msg.textContent = 'Password must be at least 6 characters.'; msg.className = 'msg err'; return; }
  if (pw1 !== pw2) { msg.textContent = "Passwords don't match."; msg.className = 'msg err'; return; }
  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = 'Saving…';
  try {
    const r = await fetch('/api/auth/reset-password', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ token, newPassword: pw1 })
    });
    if (r.ok) {
      msg.textContent = 'Password updated. Redirecting to sign-in…';
      msg.className = 'msg ok';
      setTimeout(() => { window.location.href = '/login.html'; }, 1800);
    } else {
      const data = await r.json().catch(() => ({}));
      msg.textContent = data.error || 'Could not reset password. Please request a new link.';
      msg.className = 'msg err';
      btn.disabled = false; btn.textContent = 'Set new password →';
    }
  } catch {
    msg.textContent = 'Network error. Please try again.';
    msg.className = 'msg err';
    btn.disabled = false; btn.textContent = 'Set new password →';
  }
}
document.addEventListener('keydown', e => { if (e.key === 'Enter') submitForm(); });
</script>
</body>
</html>
