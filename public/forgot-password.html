<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Syruvia – Reset Password</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#4f46e5;--accent2:#7c3aed;
  --bg:#f5f3ff;--card:#fff;--border:#e0e7ff;
  --text:#1e1b4b;--text2:#4c4a7a;--text3:#9b99c5;
  --red:#dc2626;--green:#16a34a;
}
body{
  font-family:Inter,ui-sans-serif,system-ui,-apple-system,sans-serif;
  background:
    radial-gradient(ellipse at 20% 0%,rgba(79,70,229,.18) 0%,transparent 50%),
    radial-gradient(ellipse at 80% 100%,rgba(124,58,237,.14) 0%,transparent 50%),
    linear-gradient(160deg,#f0eeff 0%,#fafafe 60%,#f0f4ff 100%);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  font-size:13px;color:var(--text);
}
.card{
  background:rgba(255,255,255,.96);
  border:1px solid rgba(224,231,255,.8);
  border-radius:24px;
  box-shadow:0 8px 40px rgba(79,70,229,.12),0 1px 0 rgba(255,255,255,.8) inset;
  padding:44px 40px 40px;
  width:420px;max-width:95vw;
}
.logo-wrap{text-align:center;margin-bottom:32px}
.logo-wrap img{height:44px;width:auto;margin-bottom:10px}
.logo-tagline{font-size:12px;color:var(--text3);letter-spacing:.02em}
h2{font-size:20px;font-weight:800;color:var(--text);letter-spacing:-.03em;margin-bottom:4px;text-align:center}
.subtitle{font-size:12.5px;color:var(--text2);text-align:center;margin-bottom:28px}
.form-row{margin-bottom:16px}
label{display:block;font-size:11.5px;font-weight:700;color:var(--text2);margin-bottom:6px;letter-spacing:.01em}
input{
  width:100%;padding:11px 14px;
  border:1.5px solid var(--border);border-radius:12px;
  font-size:13px;color:var(--text);background:#fff;outline:none;font-family:inherit;
  transition:.18s ease;
}
input:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(79,70,229,.1)}
.btn{
  width:100%;padding:13px;border:none;border-radius:13px;font-size:14px;font-weight:700;
  cursor:pointer;font-family:inherit;letter-spacing:-.01em;
  background:linear-gradient(135deg,#4f46e5 0%,#7c3aed 100%);
  color:#fff;box-shadow:0 4px 20px rgba(79,70,229,.35);
  transition:all .18s ease;margin-top:6px;
}
.btn:hover{transform:translateY(-1px);box-shadow:0 8px 28px rgba(79,70,229,.42)}
.btn:disabled{opacity:.6;cursor:default;transform:none;box-shadow:none}
.msg-info{
  background:#f0fdf4;border:1.5px solid #bbf7d0;color:#065f46;
  font-size:12px;padding:12px 14px;border-radius:10px;margin-bottom:16px;
  display:none;line-height:1.5;
}
.msg-info.show{display:block}
.msg-error{
  background:#fef2f2;border:1.5px solid #fecaca;color:var(--red);
  font-size:12px;padding:10px 12px;border-radius:10px;margin-bottom:16px;
  display:none;
}
.msg-error.show{display:block}
.back-link{
  display:block;text-align:center;margin-top:18px;
  font-size:12px;color:var(--accent);text-decoration:none;font-weight:600;
}
.back-link:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="card">
  <div class="logo-wrap">
    <img src="/syruvia-logo.svg" alt="Syruvia"/>
    <div class="logo-tagline">Work Management Platform</div>
  </div>

  <h2>Reset your password</h2>
  <p class="subtitle">Enter your email and we'll send you a reset link.</p>

  <div class="msg-info" id="info-msg"></div>
  <div class="msg-error" id="err-msg"></div>

  <div class="form-row">
    <label>Email address</label>
    <input type="email" id="fp-email" placeholder="you@company.com" autocomplete="email"/>
  </div>
  <button class="btn" id="fp-btn" onclick="submitForgot()">Send reset link →</button>

  <a href="/login.html" class="back-link">← Back to sign in</a>
</div>

<script>
function showInfo(msg) {
  document.getElementById('info-msg').textContent = msg;
  document.getElementById('info-msg').classList.add('show');
  document.getElementById('err-msg').classList.remove('show');
}
function showErr(msg) {
  document.getElementById('err-msg').textContent = msg;
  document.getElementById('err-msg').classList.add('show');
  document.getElementById('info-msg').classList.remove('show');
}

async function submitForgot() {
  const email = document.getElementById('fp-email').value.trim();
  if (!email) { showErr('Please enter your email.'); return; }
  const btn = document.getElementById('fp-btn');
  btn.disabled = true; btn.textContent = 'Sending…';
  try {
    const r = await fetch('/api/auth/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    const data = await r.json().catch(() => ({}));
    if (!r.ok) {
      showErr(data.error || 'Could not send the reset link. Please try again.');
    } else {
      showInfo("If that email is on an account, we've sent a reset link. Check your inbox (and spam folder). The link expires in 1 hour.");
      document.getElementById('fp-email').value = '';
    }
  } catch {
    showErr('Network error. Please try again.');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Send reset link →';
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') submitForgot(); });
</script>
</body>
</html>
