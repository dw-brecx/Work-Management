<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Syruvia – Sign In</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#4f46e5;--accent2:#7c3aed;
  --bg:#f5f3ff;--card:#fff;--border:#e0e7ff;
  --text:#1e1b4b;--text2:#4c4a7a;--text3:#9b99c5;
  --red:#dc2626;--green:#16a34a;
}
body{
  font-family:Inter,ui-sans-serif,system-ui,-apple-system,sans-serif;
  background:
    radial-gradient(ellipse at 20% 0%,rgba(79,70,229,.18) 0%,transparent 50%),
    radial-gradient(ellipse at 80% 100%,rgba(124,58,237,.14) 0%,transparent 50%),
    linear-gradient(160deg,#f0eeff 0%,#fafafe 60%,#f0f4ff 100%);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  font-size:13px;color:var(--text);
}
.card{
  background:rgba(255,255,255,.96);
  border:1px solid rgba(224,231,255,.8);
  border-radius:24px;
  box-shadow:0 8px 40px rgba(79,70,229,.12),0 1px 0 rgba(255,255,255,.8) inset;
  padding:44px 40px 40px;
  width:420px;max-width:95vw;
}
.logo-wrap{text-align:center;margin-bottom:32px}
.logo-wrap img{height:44px;width:auto;margin-bottom:10px}
.logo-tagline{font-size:12px;color:var(--text3);letter-spacing:.02em}
h2{font-size:20px;font-weight:800;color:var(--text);letter-spacing:-.03em;margin-bottom:4px;text-align:center}
.subtitle{font-size:12.5px;color:var(--text2);text-align:center;margin-bottom:28px}
.form-row{margin-bottom:16px}
label{display:block;font-size:11.5px;font-weight:700;color:var(--text2);margin-bottom:6px;letter-spacing:.01em}
input{
  width:100%;padding:11px 14px;
  border:1.5px solid var(--border);border-radius:12px;
  font-size:13px;color:var(--text);background:#fff;outline:none;font-family:inherit;
  transition:.18s ease;
}
input:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(79,70,229,.1)}
input.error{border-color:var(--red);box-shadow:0 0 0 4px rgba(220,38,38,.08)}
.pw-wrap{position:relative}
.pw-wrap input{padding-right:42px}
.pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text3);line-height:1;padding:2px}
.pw-toggle:hover{color:var(--accent)}
.btn{
  width:100%;padding:13px;border:none;border-radius:13px;font-size:14px;font-weight:700;
  cursor:pointer;font-family:inherit;letter-spacing:-.01em;
  background:linear-gradient(135deg,#4f46e5 0%,#7c3aed 100%);
  color:#fff;box-shadow:0 4px 20px rgba(79,70,229,.35);
  transition:all .18s ease;margin-top:6px;
}
.btn:hover{transform:translateY(-1px);box-shadow:0 8px 28px rgba(79,70,229,.42)}
.btn:active{transform:translateY(0);box-shadow:0 2px 12px rgba(79,70,229,.3)}
.btn:disabled{opacity:.6;cursor:default;transform:none;box-shadow:none}
.err-msg{
  background:#fef2f2;border:1.5px solid #fecaca;color:var(--red);
  font-size:12px;padding:10px 12px;border-radius:10px;margin-bottom:16px;
  display:none;align-items:center;gap:8px;
}
.err-msg.show{display:flex}
.err-msg svg{flex-shrink:0}
.divider{height:1px;background:var(--border);margin:20px 0}
.no-account{
  background:linear-gradient(135deg,#f0fdf4,#ecfdf5);
  border:1.5px solid #bbf7d0;border-radius:12px;
  padding:12px 16px;text-align:center;margin-top:20px;
}
.no-account p{font-size:12px;color:#065f46;line-height:1.6}
.no-account strong{color:#047857}
.demo-hint{
  font-size:11px;color:var(--text3);text-align:center;margin-top:16px;
  padding:8px 12px;background:#f9f9ff;border-radius:8px;border:1px solid #e8e5ff;
}
.demo-hint code{
  background:#eef2ff;color:#4f46e5;padding:1px 5px;border-radius:4px;
  font-family:ui-monospace,monospace;font-size:10.5px;font-weight:600;
}
</style>
</head>
<body>
<div class="card">
  <div class="logo-wrap">
    <img src="/syruvia-logo.svg" alt="Syruvia"/>
    <div class="logo-tagline">Work Management Platform</div>
  </div>

  <h2>Welcome back</h2>
  <p class="subtitle">Sign in to your Syruvia workspace</p>

  <div class="err-msg" id="signin-err">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span id="signin-err-text"></span>
  </div>

  <div class="form-row">
    <label>Email address</label>
    <input type="email" id="si-email" placeholder="you@company.com" autocomplete="email"/>
  </div>
  <div class="form-row">
    <label>Password</label>
    <div class="pw-wrap">
      <input type="password" id="si-pw" placeholder="Your password" autocomplete="current-password"/>
      <button class="pw-toggle" type="button" onclick="togglePw('si-pw',this)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
  </div>
  <button class="btn" id="signin-btn" onclick="doSignIn()">Sign In →</button>

  <div class="divider"></div>

  <div class="no-account">
    <p>Don't have an account?<br><strong>Ask your workspace admin to invite you.</strong><br>Accounts are by invitation only.</p>
  </div>

  <div class="demo-hint">
    Demo admin: <code>admin@worknest.com</code> / <code>admin123</code>
  </div>
</div>

<script>
function togglePw(id, btn) {
  const inp = document.getElementById(id);
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.innerHTML = inp.type === 'password'
    ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>'
    : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
}

function showErr(msg) {
  document.getElementById('signin-err-text').textContent = msg;
  document.getElementById('signin-err').classList.add('show');
}
function hideErr() { document.getElementById('signin-err').classList.remove('show'); }

async function doSignIn() {
  hideErr();
  const email = document.getElementById('si-email').value.trim();
  const password = document.getElementById('si-pw').value;
  if (!email || !password) { showErr('Please enter your email and password.'); return; }
  const btn = document.getElementById('signin-btn');
  btn.disabled = true; btn.textContent = 'Signing in…';
  try {
    const r = await fetch('/api/auth/login', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ email, password })
    });
    const data = await r.json();
    if (!r.ok) { showErr(data.error || 'Sign in failed. Check your credentials.'); return; }
    window.location.href = '/';
  } catch { showErr('Network error. Please try again.'); }
  finally { btn.disabled = false; btn.textContent = 'Sign In →'; }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doSignIn(); });
fetch('/api/auth/me').then(r => { if (r.ok) window.location.href = '/'; });
</script>
</body>
</html>
