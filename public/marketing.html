<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Syruvia · Marketing</title>
<meta name="theme-color" content="#0f172a"/>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
<link rel="stylesheet" href="/marketing.css"/>
<link rel="stylesheet" href="/ui-dialog.css"/>
<script src="/ui-dialog.js"></script>
</head>
<body>
<!-- Two-pane shell: the sidebar mirrors the main app's nav so users can
     hop into other parts without losing where they are; the main pane
     hosts the marketing app itself. Each nav item is a plain anchor —
     the browser does a real page-load into the SPA shell so the main
     app boots fresh from its own URL. -->
<div class="mk-shell">
  <aside id="mk-sidebar">
    <div class="mk-sb-logo">
      <a href="/dashboard" class="mk-sb-logo-link" title="Back to dashboard">
        <img src="/syruvia-logo.svg" class="mk-sb-logo-img" alt="Syruvia"/>
      </a>
    </div>
    <nav class="mk-sb-nav">
      <div class="mk-sb-section">Overview</div>
      <a class="mk-sb-item" href="/dashboard">
        <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
        Dashboard
      </a>

      <div class="mk-sb-divider"></div>
      <div class="mk-sb-section">Tickets</div>
      <a class="mk-sb-item" href="/tickets">
        <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
        All Tickets
      </a>
      <a class="mk-sb-item" href="/my-tickets">
        <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
        My Tickets
      </a>
      <a class="mk-sb-item" href="/snoozed">
        <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22a10 10 0 1 0-10-10"/><polyline points="2 8 6 8 6 12"/><path d="M9 9h6l-6 6h6"/></svg>
        Snoozed
      </a>
      <a class="mk-sb-item" href="/recurring">
        <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        Recurring Tasks
      </a>

      <div class="mk-sb-divider"></div>
      <div class="mk-sb-section">Personal</div>
      <a class="mk-sb-item" href="/notifications">
        <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
        Notifications
      </a>
      <a class="mk-sb-item" href="/my-reminders">
        <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path d="M18 8a6 6 0 00-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
        My Reminders
      </a>
      <a class="mk-sb-item" href="/mentioned">
        <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M16 8v5a3 3 0 0 0 6 0v-1a10 10 0 1 0-4 8"/></svg>
        Mentioned
      </a>

      <div class="mk-sb-divider"></div>
      <div class="mk-sb-section">Plans &amp; Calendar</div>
      <a class="mk-sb-item" href="/planning">
        <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path d="M9 2h6l4 4v14a2 2 0 01-2 2H7a2 2 0 01-2-2V4a2 2 0 012-2z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="13" y2="17"/></svg>
        Planning
      </a>
      <a class="mk-sb-item" href="/calendar">
        <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Calendar
      </a>

      <div class="mk-sb-divider"></div>
      <div class="mk-sb-section">Workspace</div>
      <a class="mk-sb-item" href="/docs">
        <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="13" y2="17"/></svg>
        Docs
      </a>
      <a class="mk-sb-item" href="/chat">
        <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Chat
      </a>
      <a class="mk-sb-item" href="/spaces">
        <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>
        Spaces
      </a>
      <a class="mk-sb-item" href="/teams">
        <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
        Teams
      </a>
      <a class="mk-sb-item" href="/flavors.html">
        <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path d="M12 2c-1.5 4-4 5-4 8a4 4 0 008 0c0-3-2.5-4-4-8z"/><path d="M5 14a7 7 0 0014 0"/></svg>
        Flavors
      </a>
      <a class="mk-sb-item active" href="/marketing">
        <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l18-5v12L3 14v-3z"/><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/></svg>
        Marketing
      </a>

      <div class="mk-sb-divider"></div>
      <div class="mk-sb-section">Build</div>
      <a class="mk-sb-item" href="/apps">
        <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        Apps
      </a>

      <div class="mk-sb-divider"></div>
      <div class="mk-sb-section">Help</div>
      <a class="mk-sb-item" href="/whats-new">
        <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path d="M3 11l18-8-8 18-2-8-8-2z"/></svg>
        What's New
      </a>
      <a class="mk-sb-item" href="/settings">
        <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93l-1.41 1.41M4.93 4.93l1.41 1.41M12 2v2M12 20v2M2 12h2M20 12h2M19.07 19.07l-1.41-1.41M4.93 19.07l1.41-1.41"/></svg>
        Settings
      </a>
    </nav>
  </aside>
  <main id="mk-app">
    <div id="mk-boot" class="mk-boot">Loading marketing…</div>
  </main>
</div>
<script src="/marketing.js" defer></script>
</body>
</html>
